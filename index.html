<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ChatIO</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    /* ── Login Screen ── */
    #loginScreen {
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(16px);
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 20px;
      padding: 48px 40px;
      width: 100%;
      max-width: 420px;
      text-align: center;
      box-shadow: 0 24px 60px rgba(0, 0, 0, 0.4);
    }

    #loginScreen h1 {
      color: #fff;
      font-size: 2rem;
      font-weight: 700;
      margin-bottom: 8px;
      letter-spacing: -0.5px;
    }

    #loginScreen p {
      color: rgba(255, 255, 255, 0.55);
      margin-bottom: 32px;
      font-size: 0.95rem;
    }

    #loginScreen input[type="text"] {
      width: 100%;
      padding: 14px 18px;
      border-radius: 12px;
      border: 1px solid rgba(255, 255, 255, 0.15);
      background: rgba(255, 255, 255, 0.08);
      color: #fff;
      font-size: 1rem;
      outline: none;
      margin-bottom: 16px;
      transition: border-color 0.2s;
    }

    #loginScreen input[type="text"]::placeholder { color: rgba(255,255,255,0.35); }
    #loginScreen input[type="text"]:focus { border-color: #4f8ef7; }

    #loginScreen button {
      width: 100%;
      padding: 14px;
      border-radius: 12px;
      border: none;
      background: linear-gradient(135deg, #4f8ef7, #764ba2);
      color: #fff;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
    }

    #loginScreen button:hover { opacity: 0.9; transform: translateY(-1px); }
    #loginScreen button:active { transform: translateY(0); }

    #loginError {
      color: #ff6b6b;
      font-size: 0.85rem;
      margin-top: 10px;
      min-height: 20px;
    }

    /* ── Chat Layout ── */
    #chatScreen {
      display: none;
      width: 100%;
      max-width: 900px;
      height: 90vh;
      max-height: 700px;
      background: rgba(255, 255, 255, 0.04);
      backdrop-filter: blur(16px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 24px 60px rgba(0, 0, 0, 0.4);
      flex-direction: row;
    }

    #chatScreen.active { display: flex; }

    /* ── Sidebar ── */
    #sidebar {
      width: 220px;
      min-width: 220px;
      background: rgba(0, 0, 0, 0.25);
      border-right: 1px solid rgba(255, 255, 255, 0.08);
      display: flex;
      flex-direction: column;
      padding: 24px 16px;
    }

    #sidebar h2 {
      color: #fff;
      font-size: 1.3rem;
      font-weight: 700;
      margin-bottom: 4px;
    }

    #sidebar .subtitle {
      color: rgba(255,255,255,0.4);
      font-size: 0.75rem;
      margin-bottom: 24px;
    }

    #sidebar h4 {
      color: rgba(255,255,255,0.5);
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 12px;
    }

    #users {
      display: flex;
      flex-direction: column;
      gap: 8px;
      overflow-y: auto;
      flex: 1;
    }

    .user-item {
      display: flex;
      align-items: center;
      gap: 10px;
      color: rgba(255,255,255,0.85);
      font-size: 0.9rem;
      padding: 6px 8px;
      border-radius: 8px;
      transition: background 0.15s;
    }

    .user-item:hover { background: rgba(255,255,255,0.06); }

    .user-avatar {
      width: 30px;
      height: 30px;
      border-radius: 50%;
      background: linear-gradient(135deg, #4f8ef7, #764ba2);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.75rem;
      font-weight: 700;
      color: #fff;
      flex-shrink: 0;
    }

    .online-dot {
      width: 7px;
      height: 7px;
      background: #4cd964;
      border-radius: 50%;
      margin-left: auto;
      flex-shrink: 0;
    }

    /* ── Main chat area ── */
    #chatMain {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-width: 0;
    }

    #chatHeader {
      padding: 18px 24px;
      border-bottom: 1px solid rgba(255,255,255,0.08);
      color: #fff;
      font-size: 1rem;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    #chatHeader .dot {
      width: 9px;
      height: 9px;
      background: #4cd964;
      border-radius: 50%;
    }

    #chatWindow {
      flex: 1;
      overflow-y: auto;
      padding: 20px 24px;
      display: flex;
      flex-direction: column;
      gap: 4px;
      scroll-behavior: smooth;
    }

    /* Scrollbar */
    #chatWindow::-webkit-scrollbar { width: 5px; }
    #chatWindow::-webkit-scrollbar-track { background: transparent; }
    #chatWindow::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 10px; }

    /* Messages */
    .msg-row {
      display: flex;
      flex-direction: column;
      max-width: 72%;
      gap: 3px;
    }

    .msg-row.mine { align-self: flex-end; align-items: flex-end; }
    .msg-row.other { align-self: flex-start; align-items: flex-start; }

    .msg-author {
      font-size: 0.72rem;
      color: rgba(255,255,255,0.4);
      padding: 0 6px;
    }

    .msg-bubble {
      padding: 10px 16px;
      border-radius: 18px;
      font-size: 0.92rem;
      line-height: 1.45;
      word-break: break-word;
    }

    .msg-row.mine .msg-bubble {
      background: linear-gradient(135deg, #4f8ef7, #764ba2);
      color: #fff;
      border-bottom-right-radius: 4px;
    }

    .msg-row.other .msg-bubble {
      background: rgba(255,255,255,0.1);
      color: rgba(255,255,255,0.9);
      border-bottom-left-radius: 4px;
    }

    .msg-time {
      font-size: 0.68rem;
      color: rgba(255,255,255,0.3);
      padding: 0 6px;
    }

    /* System messages */
    .system-msg {
      align-self: center;
      font-size: 0.75rem;
      color: rgba(255,255,255,0.35);
      background: rgba(255,255,255,0.05);
      padding: 4px 14px;
      border-radius: 20px;
      margin: 6px 0;
    }

    /* Typing indicator */
    #feedback {
      padding: 6px 24px 0;
      font-size: 0.8rem;
      color: rgba(255,255,255,0.4);
      font-style: italic;
      min-height: 24px;
    }

    /* Input area */
    #inputArea {
      padding: 16px 24px;
      border-top: 1px solid rgba(255,255,255,0.08);
      display: flex;
      gap: 12px;
      align-items: center;
    }

    #message {
      flex: 1;
      padding: 12px 18px;
      border-radius: 25px;
      border: 1px solid rgba(255,255,255,0.12);
      background: rgba(255,255,255,0.07);
      color: #fff;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.2s;
    }

    #message::placeholder { color: rgba(255,255,255,0.3); }
    #message:focus { border-color: #4f8ef7; }

    #sendBtn {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      border: none;
      background: linear-gradient(135deg, #4f8ef7, #764ba2);
      color: #fff;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: opacity 0.2s, transform 0.1s;
    }

    #sendBtn:hover { opacity: 0.85; transform: scale(1.05); }

    #sendBtn svg { width: 18px; height: 18px; fill: #fff; }
  </style>
</head>
<body>

  <!-- Login -->
  <div id="loginScreen">
    <h1>💬 ChatIO</h1>
    <p>Chat en temps réel — Choisissez un pseudo pour rejoindre</p>
    <input type="text" id="username" placeholder="Votre pseudo..." maxlength="20" autofocus />
    <button id="joinBtn">Rejoindre le chat</button>
    <div id="loginError"></div>
  </div>

  <!-- Chat -->
  <div id="chatScreen">
    <div id="sidebar">
      <h2>ChatIO</h2>
      <p class="subtitle">Chat en temps réel</p>
      <h4>Connectés</h4>
      <div id="users"></div>
    </div>

    <div id="chatMain">
      <div id="chatHeader">
        <span class="dot"></span>
        Chat général
      </div>
      <div id="chatWindow"></div>
      <div id="feedback"></div>
      <div id="inputArea">
        <input type="text" id="message" placeholder="Votre message..." maxlength="500" />
        <button id="sendBtn" title="Envoyer">
          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
          </svg>
        </button>
      </div>
    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    const socket = io();

    let myUsername = '';
    let typingTimeout = null;

    const loginScreen  = document.getElementById('loginScreen');
    const chatScreen   = document.getElementById('chatScreen');
    const usernameInput = document.getElementById('username');
    const joinBtn      = document.getElementById('joinBtn');
    const loginError   = document.getElementById('loginError');
    const chatWindow   = document.getElementById('chatWindow');
    const messageInput = document.getElementById('message');
    const sendBtn      = document.getElementById('sendBtn');
    const usersDiv     = document.getElementById('users');
    const feedback     = document.getElementById('feedback');

    // ── Join ──
    function joinChat() {
      const username = usernameInput.value.trim();
      if (!username) return;

      socket.emit('new user', username, (res) => {
        if (res.success) {
          myUsername = username;
          loginScreen.style.display = 'none';
          chatScreen.classList.add('active');
          messageInput.focus();
        } else {
          loginError.textContent = res.error || 'Erreur lors de la connexion.';
        }
      });
    }

    joinBtn.addEventListener('click', joinChat);
    usernameInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') joinChat(); });

    // ── Send message ──
    function sendMessage() {
      const msg = messageInput.value.trim();
      if (!msg) return;
      socket.emit('send message', msg);
      messageInput.value = '';
    }

    sendBtn.addEventListener('click', sendMessage);
    messageInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') sendMessage(); });

    // ── Typing ──
    messageInput.addEventListener('input', () => {
      socket.emit('typing');
      clearTimeout(typingTimeout);
      typingTimeout = setTimeout(() => { feedback.textContent = ''; }, 2000);
    });

    // ── Receive: user list ──
    socket.on('usernames', (users) => {
      usersDiv.innerHTML = users.map(u => `
        <div class="user-item">
          <div class="user-avatar">${u.charAt(0).toUpperCase()}</div>
          <span>${u}</span>
          <span class="online-dot"></span>
        </div>
      `).join('');
    });

    // ── Receive: new message ──
    socket.on('new message', ({ user, msg, timestamp }) => {
      feedback.textContent = '';
      const isMine = user === myUsername;
      const row = document.createElement('div');
      row.className = `msg-row ${isMine ? 'mine' : 'other'}`;
      row.innerHTML = `
        ${!isMine ? `<span class="msg-author">${user}</span>` : ''}
        <div class="msg-bubble">${escapeHtml(msg)}</div>
        <span class="msg-time">${timestamp}</span>
      `;
      chatWindow.appendChild(row);
      chatWindow.scrollTop = chatWindow.scrollHeight;
    });

    // ── Receive: system message ──
    socket.on('system message', (text) => {
      const div = document.createElement('div');
      div.className = 'system-msg';
      div.textContent = text;
      chatWindow.appendChild(div);
      chatWindow.scrollTop = chatWindow.scrollHeight;
    });

    // ── Receive: typing ──
    socket.on('typing', ({ username }) => {
      feedback.textContent = `${username} est en train d'écrire...`;
      clearTimeout(typingTimeout);
      typingTimeout = setTimeout(() => { feedback.textContent = ''; }, 2000);
    });

    // ── XSS protection ──
    function escapeHtml(str) {
      return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
                .replace(/"/g,'&quot;').replace(/'/g,'&#039;');
    }
  </script>
</body>
</html>
